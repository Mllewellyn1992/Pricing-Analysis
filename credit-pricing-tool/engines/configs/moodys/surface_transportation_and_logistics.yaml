id: surface_transportation_and_logistics
name: Surface Transportation and Logistics
version: 3 Apr 2025
factors:
- id: factor_1_scale
  name: Scale
  weight_pct: 15
  subfactors:
  - id: revenue
    name: Revenue (USD Billion)
    metric: revenue_usd_billion
    weight_pct: 15
    direction: higher_better
    units: USD_billion
    grid:
    - band: Aaa
      score: 1
      min: 60.0
      max: null
    - band: Aa
      score: 2
      min: 30.0
      max: 60.0
    - band: A
      score: 3
      min: 15.0
      max: 30.0
    - band: Baa
      score: 4
      min: 5.0
      max: 15.0
    - band: Ba
      score: 5
      min: 2.0
      max: 5.0
    - band: B
      score: 6
      min: 1.0
      max: 2.0
    - band: Caa
      score: 7
      min: 0.25
      max: 1.0
    - band: Ca
      score: 8
      min: 0.0
      max: 0.25
    notes: 'Footnote [1]: linear scoring endpoints Aaa=$100bn; Ca=$0bn (0 => numeric 20.5).'
- id: factor_2_business_profile
  name: Business Profile
  weight_pct: 25
  subfactors:
  - id: business_profile
    name: Business Profile (qualitative)
    metric: business_profile_band
    weight_pct: 25
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: Scorecard provides separate qualitative guidance for Railroads vs Trucking & Logistics; user selects the appropriate band.
- id: factor_3_profitability_efficiency
  name: Profitability and Efficiency
  weight_pct: 10
  subfactors:
  - id: ebit_margin
    name: EBIT Margin
    metric: ebit_margin_pct
    weight_pct: 10
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 40.0
      max: null
    - band: Aa
      score: 2
      min: 30.0
      max: 40.0
    - band: A
      score: 3
      min: 20.0
      max: 30.0
    - band: Baa
      score: 4
      min: 15.0
      max: 20.0
    - band: Ba
      score: 5
      min: 10.0
      max: 15.0
    - band: B
      score: 6
      min: 5.0
      max: 10.0
    - band: Caa
      score: 7
      min: 2.5
      max: 5.0
    - band: Ca
      score: 8
      min: -999.0
      max: 2.5
    notes: 'Footnote [2]: linear scoring endpoints Aaa=70%; Ca=0% (0% or worse => numeric 20.5).'
- id: factor_4_leverage_coverage
  name: Leverage and Coverage
  weight_pct: 35
  subfactors:
  - id: debt_ebitda
    name: Debt / EBITDA
    metric: debt_ebitda_x
    weight_pct: 15
    direction: lower_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 0.0
      max: 0.5
    - band: Aa
      score: 2
      min: 0.5
      max: 1.5
    - band: A
      score: 3
      min: 1.5
      max: 2.5
    - band: Baa
      score: 4
      min: 2.5
      max: 3.5
    - band: Ba
      score: 5
      min: 3.5
      max: 4.5
    - band: B
      score: 6
      min: 4.5
      max: 6.0
    - band: Caa
      score: 7
      min: 6.0
      max: 9.0
    - band: Ca
      score: 8
      min: 9.0
      max: null
    notes: 'Footnote [3]: linear scoring endpoints Aaa=0x; Ca=12x (12x or worse => numeric 20.5). Negative Debt/EBITDA also => 20.5.'
  - id: ebitda_interest
    name: EBITDA / Interest Expense
    metric: ebitda_interest_x
    weight_pct: 10
    direction: higher_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 20.0
      max: null
    - band: Aa
      score: 2
      min: 15.0
      max: 20.0
    - band: A
      score: 3
      min: 10.0
      max: 15.0
    - band: Baa
      score: 4
      min: 5.0
      max: 10.0
    - band: Ba
      score: 5
      min: 2.5
      max: 5.0
    - band: B
      score: 6
      min: 1.0
      max: 2.5
    - band: Caa
      score: 7
      min: 0.5
      max: 1.0
    - band: Ca
      score: 8
      min: -999.0
      max: 0.5
    notes: 'Footnote [4]: linear scoring endpoints Aaa=30x; Ca=0x (0x or worse => numeric 20.5).'
  - id: rcf_net_debt
    name: RCF / Net Debt
    metric: rcf_net_debt_pct
    weight_pct: 10
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 70.0
      max: null
    - band: Aa
      score: 2
      min: 50.0
      max: 70.0
    - band: A
      score: 3
      min: 35.0
      max: 50.0
    - band: Baa
      score: 4
      min: 20.0
      max: 35.0
    - band: Ba
      score: 5
      min: 12.5
      max: 20.0
    - band: B
      score: 6
      min: 5.0
      max: 12.5
    - band: Caa
      score: 7
      min: 0.0
      max: 5.0
    - band: Ca
      score: 8
      min: -999.0
      max: 0.0
    notes: 'Footnote [5]: when net debt positive, linear endpoints Aaa=100%, Ca=-5% (<=-5% => 20.5). When net debt negative: if RCF positive =>
      0.5; if RCF <=0 => 19.5.'
- id: factor_5_financial_policy
  name: Financial Policy
  weight_pct: 15
  subfactors:
  - id: financial_policy
    name: Financial Policy (qualitative)
    metric: financial_policy_band
    weight_pct: 15
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8

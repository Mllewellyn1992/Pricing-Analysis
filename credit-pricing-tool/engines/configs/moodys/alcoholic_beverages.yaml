id: alcoholic_beverages
name: Alcoholic Beverages
version: "12 Sep 2025"

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 15
    subfactors:
      - id: revenue
        name: Revenue (USD Billions)
        metric: revenue_usd_billion
        weight_pct: 15
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1, min: 40.0, max: null }
          - { band: "Aa",  score: 2, min: 25.0, max: 40.0 }
          - { band: "A",   score: 3, min: 15.0, max: 25.0 }
          - { band: "Baa", score: 4, min: 7.5, max: 15.0 }
          - { band: "Ba",  score: 5, min: 2.5, max: 7.5 }
          - { band: "B",   score: 6, min: 1.0, max: 2.5 }
          - { band: "Caa", score: 7, min: 0.5, max: 1.0 }
          - { band: "Ca",  score: 8, min: 0.0, max: 0.5 }

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 32.5
    subfactors:
      - id: diversification_exposure_riskier_markets
        name: Diversification and Exposure to Riskier Markets (qualitative)
        metric: riskier_markets_band
        weight_pct: 10
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

      - id: category_brand_strength_diversification
        name: Category / Brand Strength and Diversification (qualitative)
        metric: category_brand_strength_band
        weight_pct: 7.5
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

      - id: global_infrastructure
        name: Global Infrastructure (qualitative)
        metric: global_infrastructure_band
        weight_pct: 7.5
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

      - id: industry_innovation_distribution_infrastructure
        name: Industry Innovation, Distribution and Infrastructure (qualitative)
        metric: innovation_distribution_infra_band
        weight_pct: 7.5
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

  - id: factor_3_profitability
    name: Profitability
    weight_pct: 7.5
    subfactors:
      - id: ebita_margin
        name: EBITA Margin
        metric: ebita_margin_pct
        weight_pct: 7.5
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 40.0, max: null }
          - { band: "Aa",  score: 2, min: 35.0, max: 40.0 }
          - { band: "A",   score: 3, min: 30.0, max: 35.0 }
          - { band: "Baa", score: 4, min: 22.5, max: 30.0 }
          - { band: "Ba",  score: 5, min: 15.0, max: 22.5 }
          - { band: "B",   score: 6, min: 10.0, max: 15.0 }
          - { band: "Caa", score: 7, min: 5.0, max: 10.0 }
          - { band: "Ca",  score: 8, min: null, max: 5.0 }

  - id: factor_4_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 30
    subfactors:
      - id: rcf_net_debt
        name: RCF / Net Debt
        metric: rcf_net_debt_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 70.0, max: null }
          - { band: "Aa",  score: 2, min: 50.0, max: 70.0 }
          - { band: "A",   score: 3, min: 35.0, max: 50.0 }
          - { band: "Baa", score: 4, min: 20.0, max: 35.0 }
          - { band: "Ba",  score: 5, min: 12.5, max: 20.0 }
          - { band: "B",   score: 6, min: 5.0, max: 12.5 }
          - { band: "Caa", score: 7, min: 0.0, max: 5.0 }
          - { band: "Ca",  score: 8, min: null, max: 0.0 }
        special_cases:
          - when: { net_debt_lt_0: true, rcf_gt_0: true }
            band: "Aaa"
            score: 1
            note: "When net debt is negative and RCF is positive, treat as Aaa for this ratio."
          - when: { net_debt_lt_0: true, rcf_lte_0: true }
            band: "Ca"
            score: 8
            note: "When net debt is negative and RCF is negative or zero, treat as Ca for this ratio."

      - id: debt_ebitda
        name: Debt / EBITDA
        metric: debt_ebitda_x
        weight_pct: 12.5
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 0.0, max: 0.5 }
          - { band: "Aa",  score: 2, min: 0.5, max: 1.5 }
          - { band: "A",   score: 3, min: 1.5, max: 2.5 }
          - { band: "Baa", score: 4, min: 2.5, max: 3.5 }
          - { band: "Ba",  score: 5, min: 3.5, max: 4.5 }
          - { band: "B",   score: 6, min: 4.5, max: 6.5 }
          - { band: "Caa", score: 7, min: 6.5, max: 10.0 }
          - { band: "Ca",  score: 8, min: 10.0, max: null }
        special_cases:
          - when: { total_debt: 0 }
            band: "Aaa"
            score: 1
            note: "When debt is zero, treat as Aaa."
          - when: { total_debt_gt_0: true, ebitda_lt_0: true }
            band: "Ca"
            score: 8
            note: "When debt is positive and EBITDA is negative, treat as Ca."

      - id: ebit_interest
        name: EBIT / Interest Expense
        metric: ebit_interest_x
        weight_pct: 7.5
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 20.0, max: null }
          - { band: "Aa",  score: 2, min: 15.0, max: 20.0 }
          - { band: "A",   score: 3, min: 10.0, max: 15.0 }
          - { band: "Baa", score: 4, min: 4.0, max: 10.0 }
          - { band: "Ba",  score: 5, min: 2.0, max: 4.0 }
          - { band: "B",   score: 6, min: 1.0, max: 2.0 }
          - { band: "Caa", score: 7, min: 0.5, max: 1.0 }
          - { band: "Ca",  score: 8, min: null, max: 0.5 }
        special_cases:
          - when: { interest_expense_lte_0: true }
            band: "Aaa"
            score: 1
            note: "If interest expense is zero/negative, treat as Aaa."
          - when: { ebit_lte_0: true, interest_expense_gt_0: true }
            band: "Ca"
            score: 8
            note: "If EBIT is zero/negative with positive interest expense, treat as Ca."

  - id: factor_5_financial_policy
    name: Financial Policy
    weight_pct: 15
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 15
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

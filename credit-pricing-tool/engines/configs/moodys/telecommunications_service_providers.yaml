id: telecommunications_service_providers
name: Telecommunications Service Providers
version: 15 Nov 2023
factors:
- id: factor_1_scale
  name: Scale
  weight_pct: 10
  subfactors:
  - id: revenue
    name: Revenue (USD Billion)
    metric: revenue_usd_billion
    weight_pct: 10
    direction: higher_better
    units: USD_billion
    grid:
    - band: Aaa
      score: 1
      min: 100.0
      max: null
    - band: Aa
      score: 2
      min: 50.0
      max: 100.0
    - band: A
      score: 3
      min: 25.0
      max: 50.0
    - band: Baa
      score: 4
      min: 10.0
      max: 25.0
    - band: Ba
      score: 5
      min: 4.0
      max: 10.0
    - band: B
      score: 6
      min: 1.5
      max: 4.0
    - band: Caa
      score: 7
      min: 0.5
      max: 1.5
    - band: Ca
      score: 8
      min: 0.0
      max: 0.5
    notes: 'Footnote [1]: linear scoring endpoints Aaa=$150bn (>=150 => numeric 0.5); Ca=$0.05bn (<=0.05 => numeric 20.5).'
- id: factor_2_business_profile
  name: Business Profile
  weight_pct: 25
  subfactors:
  - id: competitive_position
    name: Competitive Position (qualitative)
    metric: competitive_position_band
    weight_pct: 15
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: User selects the band based on narrative descriptors in the scorecard.
  - id: market_share
    name: Market Share (qualitative)
    metric: market_share_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: User selects the band based on narrative descriptors in the scorecard.
- id: factor_3_profitability_efficiency
  name: Profitability and Efficiency
  weight_pct: 10
  subfactors:
  - id: revenue_margin_sustainability
    name: Revenue and Margin Sustainability (qualitative)
    metric: revenue_margin_sustainability_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: User selects the band based on narrative descriptors in the scorecard.
- id: factor_4_leverage_coverage
  name: Leverage and Coverage
  weight_pct: 40
  subfactors:
  - id: debt_ebitda
    name: Debt / EBITDA
    metric: debt_ebitda_x
    weight_pct: 15
    direction: lower_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 0.0
      max: 0.5
    - band: Aa
      score: 2
      min: 0.5
      max: 1.0
    - band: A
      score: 3
      min: 1.0
      max: 2.0
    - band: Baa
      score: 4
      min: 2.0
      max: 3.0
    - band: Ba
      score: 5
      min: 3.0
      max: 4.0
    - band: B
      score: 6
      min: 4.0
      max: 6.0
    - band: Caa
      score: 7
      min: 6.0
      max: 8.0
    - band: Ca
      score: 8
      min: 8.0
      max: null
    notes: 'Footnote [2]: linear scoring endpoints Aaa=0.0x (<=0 => 0.5); Ca=12.0x (>=12 or negative => 20.5).'
  - id: rcf_net_debt
    name: RCF / Net Debt
    metric: rcf_net_debt_pct
    weight_pct: 15
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 90.0
      max: null
    - band: Aa
      score: 2
      min: 75.0
      max: 90.0
    - band: A
      score: 3
      min: 55.0
      max: 75.0
    - band: Baa
      score: 4
      min: 35.0
      max: 55.0
    - band: Ba
      score: 5
      min: 20.0
      max: 35.0
    - band: B
      score: 6
      min: 10.0
      max: 20.0
    - band: Caa
      score: 7
      min: 5.0
      max: 10.0
    - band: Ca
      score: 8
      min: -999.0
      max: 5.0
    notes: 'Footnote [3]: if net debt positive, linear endpoints Aaa=100% (>=100 => 0.5); Ca=0% (<=0 => 20.5). If net debt negative: RCF>0 =>
      0.5; RCF<=0 => 20.5.'
  - id: ebitda_minus_capex_interest
    name: (EBITDA - Capex) / Interest Expense
    metric: ebitda_capex_interest_x
    weight_pct: 10
    direction: higher_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 8.0
      max: null
    - band: Aa
      score: 2
      min: 6.5
      max: 8.0
    - band: A
      score: 3
      min: 5.0
      max: 6.5
    - band: Baa
      score: 4
      min: 3.5
      max: 5.0
    - band: Ba
      score: 5
      min: 2.0
      max: 3.5
    - band: B
      score: 6
      min: 1.0
      max: 2.0
    - band: Caa
      score: 7
      min: 0.5
      max: 1.0
    - band: Ca
      score: 8
      min: -999.0
      max: 0.5
    notes: 'Footnote [4]: linear scoring endpoints Aaa=20x (>=20 => 0.5); Ca=0.5x (<=0.5 => 20.5).'
- id: factor_5_financial_policy
  name: Financial Policy
  weight_pct: 15
  subfactors:
  - id: financial_policy
    name: Financial Policy (qualitative)
    metric: financial_policy_band
    weight_pct: 15
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: User selects the band based on narrative descriptors in the scorecard.

id: chemicals
name: Chemicals
version: "30 Oct 2023"

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 15
    subfactors:
      - id: revenue
        name: Revenue (USD Billion)
        metric: revenue_usd_billion
        weight_pct: 15
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1, min: 60.0,  max: null }   # >= $60
          - { band: "Aa",  score: 2, min: 30.0,  max: 60.0 }    # $30–$60
          - { band: "A",   score: 3, min: 15.0,  max: 30.0 }    # $15–$30
          - { band: "Baa", score: 4, min: 5.0,   max: 15.0 }    # $5–$15
          - { band: "Ba",  score: 5, min: 2.0,   max: 5.0 }     # $2–$5
          - { band: "B",   score: 6, min: 1.0,   max: 2.0 }     # $1–$2
          - { band: "Caa", score: 7, min: 0.25,  max: 1.0 }     # $0.25–$1
          - { band: "Ca",  score: 8, min: 0.0,   max: 0.25 }    # < $0.25
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 100.0   # $100bn or better => numeric 0.5
          ca_endpoint_value: 0.0      # $0bn => numeric 20.5

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 25
    subfactors:
      - id: business_profile
        name: Business Profile (qualitative)
        metric: business_profile_band
        weight_pct: 25
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

  - id: factor_3_profitability_efficiency
    name: Profitability and Efficiency
    weight_pct: 10
    subfactors:
      - id: ebita_margin
        name: EBITA Margin
        metric: ebita_margin_pct
        weight_pct: 5
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 60.0, max: null }     # >= 60%
          - { band: "Aa",  score: 2, min: 40.0, max: 60.0 }     # 40–60%
          - { band: "A",   score: 3, min: 25.0, max: 40.0 }     # 25–40%
          - { band: "Baa", score: 4, min: 15.0, max: 25.0 }     # 15–25%
          - { band: "Ba",  score: 5, min: 9.0,  max: 15.0 }     # 9–15%
          - { band: "B",   score: 6, min: 4.0,  max: 9.0 }      # 4–9%
          - { band: "Caa", score: 7, min: 1.0,  max: 4.0 }      # 1–4%
          - { band: "Ca",  score: 8, min: 0.0,  max: 1.0 }      # < 1%
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 80.0    # 80% or better => numeric 0.5
          ca_endpoint_value: 0.0      # 0% or worse => numeric 20.5

      - id: return_on_average_assets
        name: Return on Average Assets
        metric: return_on_avg_assets_pct
        weight_pct: 5
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 35.0, max: null }     # >= 35%
          - { band: "Aa",  score: 2, min: 25.0, max: 35.0 }     # 25–35%
          - { band: "A",   score: 3, min: 15.0, max: 25.0 }     # 15–25%
          - { band: "Baa", score: 4, min: 11.0, max: 15.0 }     # 11–15%
          - { band: "Ba",  score: 5, min: 7.0,  max: 11.0 }     # 7–11%
          - { band: "B",   score: 6, min: 3.0,  max: 7.0 }      # 3–7%
          - { band: "Caa", score: 7, min: 0.5,  max: 3.0 }      # 0.5–3%
          - { band: "Ca",  score: 8, min: 0.0,  max: 0.5 }      # < 0.5%
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 75.0    # 75% or better => numeric 0.5
          ca_endpoint_value: 0.0      # 0% or worse => numeric 20.5

  - id: factor_4_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 30
    subfactors:
      - id: debt_ebitda
        name: Debt / EBITDA
        metric: debt_ebitda_x
        weight_pct: 10
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 0.0, max: 0.5 }       # <= 0.5x
          - { band: "Aa",  score: 2, min: 0.5, max: 1.0 }       # 0.5–1x
          - { band: "A",   score: 3, min: 1.0, max: 2.0 }       # 1–2x
          - { band: "Baa", score: 4, min: 2.0, max: 3.0 }       # 2–3x
          - { band: "Ba",  score: 5, min: 3.0, max: 4.0 }       # 3–4x
          - { band: "B",   score: 6, min: 4.0, max: 6.0 }       # 4–6x
          - { band: "Caa", score: 7, min: 6.0, max: 8.0 }       # 6–8x
          - { band: "Ca",  score: 8, min: 8.0, max: null }      # > 8x
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 0.0     # 0x => numeric 0.5
          ca_endpoint_value: 12.0     # 12x or worse => numeric 20.5
        special_cases:
          - when: { debt_ebitda_lt_0: true }
            band: "Ca"
            score: 8
            note: "Negative Debt/EBITDA is treated as worst (numeric 20.5)."

      - id: rcf_net_debt
        name: RCF / Net Debt
        metric: rcf_net_debt_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 70.0,  max: null }    # >= 70%
          - { band: "Aa",  score: 2, min: 50.0,  max: 70.0 }     # 50–70%
          - { band: "A",   score: 3, min: 35.0,  max: 50.0 }     # 35–50%
          - { band: "Baa", score: 4, min: 20.0,  max: 35.0 }     # 20–35%
          - { band: "Ba",  score: 5, min: 12.5,  max: 20.0 }     # 12.5–20%
          - { band: "B",   score: 6, min: 5.0,   max: 12.5 }     # 5–12.5%
          - { band: "Caa", score: 7, min: 0.0,   max: 5.0 }      # 0–5%
          - { band: "Ca",  score: 8, min: null,  max: 0.0 }      # < 0%
        endpoints_for_linear_scoring_if_net_debt_positive:
          aaa_endpoint_value: 100.0   # 100% or better => numeric 0.5
          ca_endpoint_value: 5.0      # 5% or worse => numeric 20.5
        special_cases:
          - when: { net_debt_lt_0: true, rcf_gt_0: true }
            band: "Aaa"
            score: 1
            note: "If net debt is negative and RCF is positive => numeric 0.5 (best)."
          - when: { net_debt_lt_0: true, rcf_lt_0: true }
            band: "Ca"
            score: 8
            note: "If net debt is negative and RCF is negative => numeric 19.5 (worst for this metric)."

      - id: ebita_interest
        name: EBITA / Interest Expense
        metric: ebita_interest_x
        weight_pct: 10
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 40.0, max: null }     # >= 40x
          - { band: "Aa",  score: 2, min: 25.0, max: 40.0 }      # 25–40x
          - { band: "A",   score: 3, min: 15.0, max: 25.0 }      # 15–25x
          - { band: "Baa", score: 4, min: 8.0,  max: 15.0 }      # 8–15x
          - { band: "Ba",  score: 5, min: 2.5,  max: 8.0 }       # 2.5–8x
          - { band: "B",   score: 6, min: 1.5,  max: 2.5 }       # 1.5–2.5x
          - { band: "Caa", score: 7, min: 0.5,  max: 1.5 }       # 0.5–1.5x
          - { band: "Ca",  score: 8, min: 0.0,  max: 0.5 }       # < 0.5x
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 60.0    # 60x or better => numeric 0.5
          ca_endpoint_value: 0.0      # 0x or worse => numeric 20.5

  - id: factor_5_financial_policy
    name: Financial Policy
    weight_pct: 20
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 20
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

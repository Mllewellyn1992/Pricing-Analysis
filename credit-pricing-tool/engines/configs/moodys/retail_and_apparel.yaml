id: retail_and_apparel
name: Retail and Apparel
version: 12 Sep 2025
factors:
- id: factor_1_scale
  name: Scale
  weight_pct: 15
  subfactors:
  - id: revenue
    name: Revenue (USD Billion)
    metric: revenue_usd_billion
    weight_pct: 15
    direction: higher_better
    units: USD_billion
    grid:
    - band: Aaa
      score: 1
      min: 100.0
      max: null
    - band: Aa
      score: 2
      min: 50.0
      max: 100.0
    - band: A
      score: 3
      min: 25.0
      max: 50.0
    - band: Baa
      score: 4
      min: 10.0
      max: 25.0
    - band: Ba
      score: 5
      min: 4.0
      max: 10.0
    - band: B
      score: 6
      min: 1.5
      max: 4.0
    - band: Caa
      score: 7
      min: 0.5
      max: 1.5
    - band: Ca
      score: 8
      min: 0.0
      max: 0.5
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 100.0
      ca_endpoint_value: 0.0
      note: 'Footnote [1]: Aaa endpoint $100bn; Ca endpoint $0bn. A value of $0bn => numeric score 20.5.'
- id: factor_2_business_profile
  name: Business Profile
  weight_pct: 20
  subfactors:
  - id: market_characteristics
    name: Market Characteristics (qualitative)
    metric: market_characteristics_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
  - id: market_position
    name: Market Position (qualitative)
    metric: market_position_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
- id: factor_3_profitability_efficiency
  name: Profitability and Efficiency
  weight_pct: 10
  subfactors:
  - id: revenue_earnings_stability
    name: Revenue and Earnings Stability (qualitative)
    metric: revenue_earnings_stability_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
- id: factor_4_leverage_coverage
  name: Leverage and Coverage
  weight_pct: 40
  subfactors:
  - id: debt_ebitda
    name: Debt / EBITDA
    metric: debt_ebitda_x
    weight_pct: 15
    direction: lower_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 0.0
      max: 0.5
    - band: Aa
      score: 2
      min: 0.5
      max: 1.0
    - band: A
      score: 3
      min: 1.0
      max: 2.0
    - band: Baa
      score: 4
      min: 2.0
      max: 3.0
    - band: Ba
      score: 5
      min: 3.0
      max: 4.0
    - band: B
      score: 6
      min: 4.0
      max: 6.0
    - band: Caa
      score: 7
      min: 6.0
      max: 8.0
    - band: Ca
      score: 8
      min: 8.0
      max: null
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 0.0
      ca_endpoint_value: 12.0
      note: 'Footnote [2]: Aaa endpoint 0x; 12x => numeric score 20.5; negative Debt/EBITDA also => 20.5.'
  - id: rcf_net_debt
    name: RCF / Net Debt
    metric: rcf_net_debt_pct
    weight_pct: 10
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 60.0
      max: 80.0
    - band: Aa
      score: 2
      min: 40.0
      max: 60.0
    - band: A
      score: 3
      min: 25.0
      max: 40.0
    - band: Baa
      score: 4
      min: 15.0
      max: 25.0
    - band: Ba
      score: 5
      min: 10.0
      max: 15.0
    - band: B
      score: 6
      min: 5.0
      max: 10.0
    - band: Caa
      score: 7
      min: 0.0
      max: 5.0
    - band: Ca
      score: 8
      min: -1000000000.0
      max: 0.0
    endpoints_for_linear_scoring:
      aaa_endpoint_value_when_net_debt_positive: 80.0
      ca_endpoint_value_when_net_debt_positive: 0.0
      note: 'Footnote [3]: when net debt positive, 0% or worse => numeric score 20.5. When net debt negative and RCF positive => 0.5; when net
        debt negative and RCF <=0 => 20.5.'
  - id: ebitda_minus_capex_interest
    name: (EBITDA - Capex) / Interest Expense
    metric: ebitda_minus_capex_interest_x
    weight_pct: 15
    direction: higher_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 16.0
      max: 20.0
    - band: Aa
      score: 2
      min: 9.0
      max: 16.0
    - band: A
      score: 3
      min: 4.5
      max: 9.0
    - band: Baa
      score: 4
      min: 2.5
      max: 4.5
    - band: Ba
      score: 5
      min: 1.25
      max: 2.5
    - band: B
      score: 6
      min: 0.25
      max: 1.25
    - band: Caa
      score: 7
      min: 0.0
      max: 0.25
    - band: Ca
      score: 8
      min: -1000000000.0
      max: 0.0
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 20.0
      ca_endpoint_value: 0.0
      note: 'Footnote [4]: Aaa endpoint 20x; 0x or worse => numeric score 20.5.'
- id: factor_5_financial_policy
  name: Financial Policy
  weight_pct: 15
  subfactors:
  - id: financial_policy
    name: Financial Policy (qualitative)
    metric: financial_policy_band
    weight_pct: 15
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8

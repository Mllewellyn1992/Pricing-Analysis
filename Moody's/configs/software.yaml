    name: Debt / EBITDA
    metric: debt_ebitda_x
    weight_pct: 10
    direction: lower_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 0.0
      max: 0.5
    - band: Aa
      score: 2
      min: 0.5
      max: 1.0

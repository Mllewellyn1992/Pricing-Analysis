id: environmental_services_waste_management
name: Environmental Services and Waste Management
version: "12 Aug 2024"

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 20
    subfactors:
      - id: revenue
        name: Revenue (USD Billion)
        metric: revenue_usd_billion
        weight_pct: 20
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1, min: 40.0,  max: null }
          - { band: "Aa",  score: 2, min: 20.0,  max: 40.0 }
          - { band: "A",   score: 3, min: 10.0,  max: 20.0 }
          - { band: "Baa", score: 4, min: 4.0,   max: 10.0 }
          - { band: "Ba",  score: 5, min: 1.5,   max: 4.0 }
          - { band: "B",   score: 6, min: 0.5,   max: 1.5 }
          - { band: "Caa", score: 7, min: 0.25,  max: 0.5 }
          - { band: "Ca",  score: 8, min: 0.0,   max: 0.25 }   # < 0.25
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 60.0   # >= 60 => numeric 0.5
          ca_endpoint_value: 0.0     # 0 => numeric 20.5

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 15
    subfactors:
      - id: business_profile
        name: Business Profile (qualitative)
        metric: business_profile_band
        weight_pct: 15
        direction: qualitative
        grid:
          - band: "Aaa"
            score: 1
            description: |
              Environmental Services: Expected to have a very strong and sustainable business position across multiple major regions or countries and a broad range of environmental businesses. Extremely high barriers to entry.
              Solid Waste Management: Expected to have top market positions across multiple major countries or regions and services that include all elements of the waste stream. Has a sustainably high level of waste internalization.
          - band: "Aa"
            score: 2
            description: |
              Environmental Services: Expected to have a strong, sustainable business position across multiple major regions or countries and a range of environmental businesses. High barriers to entry.
              Solid Waste Management: Expected to have leading market positions across multiple major countries or regions and services that include all elements of the waste stream. Has a sustainably high level of waste internalization.
          - band: "A"
            score: 3
            description: |
              Environmental Services: Expected to have a strong business position across multiple major regions or countries and a number of environmental businesses. Meaningful barriers to entry.
              Solid Waste Management: Expected to have leading market positions across several major countries or regions and services across a wide range of the waste stream. Some degree of revenue concentration may exist. Has a high level of waste internalization.
          - band: "Baa"
            score: 4
            description: |
              Environmental Services: Expected to have a solid business position across multiple large regions or countries and several environmental businesses. Moderate barriers to entry.
              Solid Waste Management: Expected to have a sustainable market position in at least one major country or region and services across several elements of the waste stream. Single market revenue concentration may exist. Has a meaningful level of waste internalization.
          - band: "Ba"
            score: 5
            description: |
              Environmental Services: Multi-region player with a competitive business position in several environmental businesses; revenues are somewhat concentrated. Some barriers to entry.
              Solid Waste Management: Multi-regional player offering services across several elements of the waste stream. Has a strong competitive position in its key markets. Revenues are relatively concentrated. Has a moderate level of waste internalization.
          - band: "B"
            score: 6
            description: |
              Environmental Services: Regional player with a competitive business position in at least two environmental businesses. Revenues are relatively concentrated. Low barriers to entry.
              Solid Waste Management: Regional player with services across at least two elements of the waste stream and a sustainable competitive position in several of its markets. Revenues are relatively concentrated. Has a modest level of waste internalization.
          - band: "Caa"
            score: 7
            description: |
              Environmental Services: Regional or local player with a somewhat competitive business position in one or two environmental businesses. Revenues are highly concentrated. No barriers to entry.
              Solid Waste Management: Regional or local market player with services in one or two elements of the waste stream and a tenuous competitive position in its markets. Has a modest level of waste internalization.
          - band: "Ca"
            score: 8
            description: |
              Environmental Services: Local player with no meaningful competitive advantage and a marginally profitable or loss-making business position in a narrow aspect of the environmental business.
              Solid Waste Management: Local market player with a deteriorating competitive position. Service offerings limited to waste collection or hauling and no landfill.

  - id: factor_3_profitability_efficiency
    name: Profitability and Efficiency
    weight_pct: 10
    subfactors:
      - id: ebit_margin
        name: EBIT Margin
        metric: ebit_margin_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 25.0, max: null }
          - { band: "Aa",  score: 2, min: 20.0, max: 25.0 }
          - { band: "A",   score: 3, min: 15.0, max: 20.0 }
          - { band: "Baa", score: 4, min: 10.0, max: 15.0 }
          - { band: "Ba",  score: 5, min: 7.0,  max: 10.0 }
          - { band: "B",   score: 6, min: 4.0,  max: 7.0 }
          - { band: "Caa", score: 7, min: 1.0,  max: 4.0 }
          - { band: "Ca",  score: 8, min: 0.0,  max: 1.0 }     # < 1%
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 40.0
          ca_endpoint_value: 0.0

  - id: factor_4_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 40
    subfactors:
      - id: debt_ebitda
        name: Debt / EBITDA
        metric: debt_ebitda_x
        weight_pct: 15
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 0.0, max: 0.5 }
          - { band: "Aa",  score: 2, min: 0.5, max: 1.0 }
          - { band: "A",   score: 3, min: 1.0, max: 2.0 }
          - { band: "Baa", score: 4, min: 2.0, max: 3.0 }
          - { band: "Ba",  score: 5, min: 3.0, max: 4.0 }
          - { band: "B",   score: 6, min: 4.0, max: 6.0 }
          - { band: "Caa", score: 7, min: 6.0, max: 8.0 }
          - { band: "Ca",  score: 8, min: 8.0, max: null }      # > 8x
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 0.0
          ca_endpoint_value: 12.0
        special_cases:
          - when: { debt_ebitda_lt_0: true }
            band: "Ca"
            score: 8
            note: "As with a negative Debt/EBITDA value."

      - id: ebitda_interest
        name: EBITDA / Interest Expense
        metric: ebitda_interest_x
        weight_pct: 15
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 30.0, max: null }
          - { band: "Aa",  score: 2, min: 20.0, max: 30.0 }
          - { band: "A",   score: 3, min: 10.0, max: 20.0 }
          - { band: "Baa", score: 4, min: 7.0,  max: 10.0 }
          - { band: "Ba",  score: 5, min: 4.0,  max: 7.0 }
          - { band: "B",   score: 6, min: 2.0,  max: 4.0 }
          - { band: "Caa", score: 7, min: 1.0,  max: 2.0 }
          - { band: "Ca",  score: 8, min: 0.0,  max: 1.0 }      # < 1x
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 40.0
          ca_endpoint_value: 0.0

      - id: rcf_net_debt
        name: RCF / Net Debt
        metric: rcf_net_debt_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 50.0, max: null }
          - { band: "Aa",  score: 2, min: 35.0, max: 50.0 }
          - { band: "A",   score: 3, min: 25.0, max: 35.0 }
          - { band: "Baa", score: 4, min: 15.0, max: 25.0 }
          - { band: "Ba",  score: 5, min: 7.0,  max: 15.0 }
          - { band: "B",   score: 6, min: 0.0,  max: 7.0 }
          - { band: "Caa", score: 7, min: -5.0, max: 0.0 }      # (5)% - 0%
          - { band: "Ca",  score: 8, min: -999.0, max: -5.0 }   # < (5)%
        endpoints_for_linear_scoring_if_net_debt_positive:
          aaa_endpoint_value: 75.0
          ca_endpoint_value: -10.0
        special_cases:
          - when: { net_debt_lt_0: true, rcf_gt_0: true }
            band: "Aaa"
            score: 1
            note: "When net debt is negative and RCF is positive, numeric score is 0.5."
          - when: { net_debt_lt_0: true, rcf_lte_0: true }
            band: "Caa"
            score: 7
            note: "When net debt is negative and RCF is negative or zero, numeric score is 16.5."

  - id: factor_5_financial_policy
    name: Financial Policy
    weight_pct: 15
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 15
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1, description: "Expected to have extremely conservative financial policies (including risk and liquidity management); very stable metrics; essentially no event risk that would cause a rating transition; and public commitment to a very strong credit profile over the long term." }
          - { band: "Aa",  score: 2, description: "Expected to have very conservative financial policies (including risk and liquidity management); stable metrics; minimal event risk that would cause a rating transition; and public commitment to a strong credit profile over the long term." }
          - { band: "A",   score: 3, description: "Expected to have predictable financial policies (including risk and liquidity management) that preserve creditor interests; although modest event risk exists, the effect on leverage is likely to be small and temporary; strong commitment to a solid credit profile." }
          - { band: "Baa", score: 4, description: "Expected to have financial policies (including risk and liquidity management) that balance the interests of creditors and shareholders; some risk that debt-funded acquisitions or shareholder distributions could lead to a weaker credit profile." }
          - { band: "Ba",  score: 5, description: "Expected to have financial policies (including risk and liquidity management) that tend to favor shareholders over creditors; above-average financial risk resulting from shareholder distributions, acquisitions or other significant capital structure changes." }
          - { band: "B",   score: 6, description: "Expected to have financial policies (including risk and liquidity management) that favor shareholders over creditors; high financial risk resulting from shareholder distributions, acquisitions or other significant capital structure changes." }
          - { band: "Caa", score: 7, description: "Expected to have financial policies (including risk and liquidity management) that create elevated risk of debt restructuring in varied economic environments." }
          - { band: "Ca",  score: 8, description: "Expected to have financial policies (including risk and liquidity management) that create elevated risk of debt restructuring even in healthy economic environments." }

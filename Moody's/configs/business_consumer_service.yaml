id: business_consumer_service
name: Business and Consumer Service Industry
version: 1

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 20
    subfactors:
      - id: revenue
        name: Revenue (USD Billion)
        metric: revenue_usd_billion
        weight_pct: 20
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1, min: 60.0, max: null }
          - { band: "Aa",  score: 3, min: 30.0, max: 60.0 }
          - { band: "A",   score: 6, min: 10.0, max: 30.0 }
          - { band: "Baa", score: 9, min: 5.0,  max: 10.0 }
          - { band: "Ba",  score: 12, min: 1.5,  max: 5.0 }
          - { band: "B",   score: 15, min: 0.5,  max: 1.5 }
          - { band: "Caa", score: 18, min: 0.2,  max: 0.5 }
          - { band: "Ca",  score: 20, min: 0.0,  max: 0.2 }

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 20
    subfactors:
      - id: demand_characteristics
        name: Demand Characteristics (qualitative)
        metric: demand_characteristics_band
        weight_pct: 15
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 3 }
          - { band: "A",   score: 6 }
          - { band: "Baa", score: 9 }
          - { band: "Ba",  score: 12 }
          - { band: "B",   score: 15 }
          - { band: "Caa", score: 18 }
          - { band: "Ca",  score: 20 }

      - id: competitive_profile
        name: Competitive Profile (qualitative)
        metric: competitive_profile_band
        weight_pct: 5
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 3 }
          - { band: "A",   score: 6 }
          - { band: "Baa", score: 9 }
          - { band: "Ba",  score: 12 }
          - { band: "B",   score: 15 }
          - { band: "Caa", score: 18 }
          - { band: "Ca",  score: 20 }

  - id: factor_3_profitability
    name: Profitability
    weight_pct: 10
    subfactors:
      - id: ebita_margin
        name: EBITA Margin
        metric: ebita_margin_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 50.0, max: null }
          - { band: "Aa",  score: 3, min: 35.0, max: 50.0 }
          - { band: "A",   score: 6, min: 25.0, max: 35.0 }
          - { band: "Baa", score: 9, min: 20.0, max: 25.0 }
          - { band: "Ba",  score: 12, min: 15.0, max: 20.0 }
          - { band: "B",   score: 15, min: 10.0, max: 15.0 }
          - { band: "Caa", score: 18, min: 5.0,  max: 10.0 }
          - { band: "Ca",  score: 20, min: 0.0,  max: 5.0 }

  - id: factor_4_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 40
    subfactors:
      - id: debt_ebitda
        name: Debt / EBITDA
        metric: debt_ebitda_x
        weight_pct: 15
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 0.0, max: 0.5 }
          - { band: "Aa",  score: 3, min: 0.5, max: 1.0 }
          - { band: "A",   score: 6, min: 1.0, max: 2.0 }
          - { band: "Baa", score: 9, min: 2.0, max: 3.0 }
          - { band: "Ba",  score: 12, min: 3.0, max: 4.5 }
          - { band: "B",   score: 15, min: 4.5, max: 6.5 }
          - { band: "Caa", score: 18, min: 6.5, max: 9.0 }
          - { band: "Ca",  score: 20, min: 9.0, max: null }

      - id: ebita_interest
        name: EBITA / Interest Expense
        metric: ebita_interest_x
        weight_pct: 15
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 25.0, max: null }
          - { band: "Aa",  score: 3, min: 15.0, max: 25.0 }
          - { band: "A",   score: 6, min: 10.0, max: 15.0 }
          - { band: "Baa", score: 9, min: 6.0,  max: 10.0 }
          - { band: "Ba",  score: 12, min: 3.0,  max: 6.0 }
          - { band: "B",   score: 15, min: 1.0,  max: 3.0 }
          - { band: "Caa", score: 18, min: 0.0,  max: 1.0 }
          - { band: "Ca",  score: 20, min: null, max: 0.0 }

      - id: rcf_net_debt
        name: RCF / Net Debt
        metric: rcf_net_debt_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 80.0, max: null }
          - { band: "Aa",  score: 3, min: 60.0, max: 80.0 }
          - { band: "A",   score: 6, min: 40.0, max: 60.0 }
          - { band: "Baa", score: 9, min: 25.0, max: 40.0 }
          - { band: "Ba",  score: 12, min: 15.0, max: 25.0 }
          - { band: "B",   score: 15, min: 7.5,  max: 15.0 }
          - { band: "Caa", score: 18, min: 2.5,  max: 7.5 }
          - { band: "Ca",  score: 20, min: 0.0,  max: 2.5 }

  - id: factor_5_financial_policy
    name: Financial Policy
    weight_pct: 10
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 10
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 3 }
          - { band: "A",   score: 6 }
          - { band: "Baa", score: 9 }
          - { band: "Ba",  score: 12 }
          - { band: "B",   score: 15 }
          - { band: "Caa", score: 18 }
          - { band: "Ca",  score: 20 }

score_to_rating:
  - { min_score: 1.0, max_score: 2.0, rating: "Aaa" }
  - { min_score: 2.0, max_score: 4.5, rating: "Aa" }
  - { min_score: 4.5, max_score: 7.5, rating: "A" }
  - { min_score: 7.5, max_score: 10.5, rating: "Baa" }
  - { min_score: 10.5, max_score: 13.5, rating: "Ba" }
  - { min_score: 13.5, max_score: 16.5, rating: "B" }
  - { min_score: 16.5, max_score: 19.0, rating: "Caa" }
  - { min_score: 19.0, max_score: 99.9, rating: "Ca" }

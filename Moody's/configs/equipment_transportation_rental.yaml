id: equipment_transportation_rental
name: Equipment and Transportation Rental
version: "10 Oct 2025"

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 10
    subfactors:
      - id: revenue
        name: Revenue (USD Billion)
        metric: revenue_usd_billion
        weight_pct: 10
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1, min: 60.0, max: null }
          - { band: "Aa",  score: 2, min: 30.0, max: 60.0 }
          - { band: "A",   score: 3, min: 15.0, max: 30.0 }
          - { band: "Baa", score: 4, min: 5.0, max: 15.0 }
          - { band: "Ba",  score: 5, min: 2.0, max: 5.0 }
          - { band: "B",   score: 6, min: 1.0, max: 2.0 }
          - { band: "Caa", score: 7, min: 0.25, max: 1.0 }
          - { band: "Ca",  score: 8, min: 0.0, max: 0.25 }

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 20
    subfactors:
      - id: business_profile
        name: Business Profile (qualitative)
        metric: business_profile_band
        weight_pct: 20
        direction: qualitative
        grid:
          - band: "Aaa"
            score: 1
            description: Expected volatility in results is almost non-existent. Supported by a commanding market position; entrenched cost effectiveness; extremely strong fleet management and constantly high utilization anticipated.
          - band: "Aa"
            score: 2
            description: Very low expected volatility in results. A deeply entrenched and leading market position that is highly defensible with strong fleet management and constantly high utilization anticipated.
          - band: "A"
            score: 3
            description: Low expected volatility in results. Supported by an entrenched market position that is defensible through cost effectiveness and solid fleet management and low anticipated swings in utilization through the cycle.
          - band: "Baa"
            score: 4
            description: Moderate expected volatility in results. Supported by a strong market position that is moderately defensible through meaningfully above average pricing power and good fleet management and strong utilization.
          - band: "Ba"
            score: 5
            description: Meaningful expected volatility in results. Moderate market position that is defensible through some price adjustments and above average fleet management and utilization levels.
          - band: "B"
            score: 6
            description: High expected volatility in results. Below average market position that is minimally defensible and expect meaningful margin pressure during periods of reduced utilization. Above average equipment concentration.
          - band: "Caa"
            score: 7
            description: Extremely high expected volatility in results. Weak market position; minimal cost effectiveness and weak fleet management and low utilization, significant equipment concentration.
          - band: "Ca"
            score: 8
            description: No consistency in results. Limited market position; no meaningful cost effectiveness; very weak fleet management and very low utilization.

  - id: factor_3_profitability_efficiency
    name: Profitability and Efficiency
    weight_pct: 10
    subfactors:
      - id: ebit_margin
        name: EBIT Margin
        metric: ebit_margin_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 60.0, max: null }
          - { band: "Aa",  score: 2, min: 35.0, max: 60.0 }
          - { band: "A",   score: 3, min: 25.0, max: 35.0 }
          - { band: "Baa", score: 4, min: 20.0, max: 25.0 }
          - { band: "Ba",  score: 5, min: 15.0, max: 20.0 }
          - { band: "B",   score: 6, min: 10.0, max: 15.0 }
          - { band: "Caa", score: 7, min: 5.0, max: 10.0 }
          - { band: "Ca",  score: 8, min: 0.0, max: 5.0 }

  - id: factor_4_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 45
    subfactors:
      - id: debt_ebitda
        name: Debt / EBITDA
        metric: debt_ebitda_x
        weight_pct: 20
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 0.0, max: 0.5 }
          - { band: "Aa",  score: 2, min: 0.5, max: 1.0 }
          - { band: "A",   score: 3, min: 1.0, max: 1.5 }
          - { band: "Baa", score: 4, min: 1.5, max: 2.5 }
          - { band: "Ba",  score: 5, min: 2.5, max: 4.0 }
          - { band: "B",   score: 6, min: 4.0, max: 6.0 }
          - { band: "Caa", score: 7, min: 6.0, max: 8.5 }
          - { band: "Ca",  score: 8, min: 8.5, max: null }
        special_cases:
          - when: { debt_ebitda_lt_0: true }
            band: "Ca"
            score: 8
            note: "Negative Debt/EBITDA => worst (20.5) treatment in linear scoring."

      - id: ebitda_interest
        name: EBITDA / Interest Expense
        metric: ebitda_interest_x
        weight_pct: 15
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 35.0, max: null }
          - { band: "Aa",  score: 2, min: 25.0, max: 35.0 }
          - { band: "A",   score: 3, min: 15.0, max: 25.0 }
          - { band: "Baa", score: 4, min: 10.0, max: 15.0 }
          - { band: "Ba",  score: 5, min: 6.0, max: 10.0 }
          - { band: "B",   score: 6, min: 2.5, max: 6.0 }
          - { band: "Caa", score: 7, min: 1.0, max: 2.5 }
          - { band: "Ca",  score: 8, min: 0.0, max: 1.0 }

      - id: rcf_net_debt
        name: RCF / Net Debt
        metric: rcf_net_debt_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 90.0, max: null }
          - { band: "Aa",  score: 2, min: 75.0, max: 90.0 }
          - { band: "A",   score: 3, min: 55.0, max: 75.0 }
          - { band: "Baa", score: 4, min: 35.0, max: 55.0 }
          - { band: "Ba",  score: 5, min: 20.0, max: 35.0 }
          - { band: "B",   score: 6, min: 10.0, max: 20.0 }
          - { band: "Caa", score: 7, min: 5.0, max: 10.0 }
          - { band: "Ca",  score: 8, min: 0.0, max: 5.0 }
        special_cases:
          - when: { net_debt_lt_0: true, rcf_gt_0: true }
            band: "Aaa"
            score: 1
            note: "Net debt negative and RCF positive => best (0.5) treatment in linear scoring."
          - when: { net_debt_lt_0: true, rcf_lte_0: true }
            band: "Ca"
            score: 8
            note: "Net debt negative and RCF <= 0 => worst (20.5) treatment in linear scoring."

  - id: factor_5_financial_policy
    name: Financial Policy
    weight_pct: 15
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 15
        direction: qualitative
        grid:
          - band: "Aaa"
            score: 1
            description: Expected to have extremely conservative financial policies (including risk and liquidity management); very stable metrics; essentially no event risk that would cause a rating transition; and public commitment to a very strong credit profile over the long term.
          - band: "Aa"
            score: 2
            description: Expected to have very conservative financial policies (including risk and liquidity management); stable metrics; minimal event risk that would cause a rating transition; and public commitment to a strong credit profile over the long term.
          - band: "A"
            score: 3
            description: Expected to have predictable financial policies (including risk and liquidity management) that preserve creditor interests; although modest event risk exists, the effect on leverage is likely to be small and temporary; strong commitment to a solid credit profile.
          - band: "Baa"
            score: 4
            description: Expected to have financial policies (including risk and liquidity management) that balance the interests of creditors and shareholders; some risk that debt-funded acquisitions or shareholder distributions could lead to a weaker credit profile.
          - band: "Ba"
            score: 5
            description: Expected to have financial policies (including risk and liquidity management) that tend to favor shareholders over creditors; above-average financial risk resulting from shareholder distributions, acquisitions, or other significant capital structure changes.
          - band: "B"
            score: 6
            description: Expected to have financial policies (including risk and liquidity management) that favor shareholders over creditors; high financial risk resulting from shareholder distributions, acquisitions, or other significant capital structure changes.
          - band: "Caa"
            score: 7
            description: Expected to have financial policies (including risk and liquidity management) that create elevated risk of debt restructuring in varied economic environments.
          - band: "Ca"
            score: 8
            description: Expected to have financial policies (including risk and liquidity management) that create elevated risk of debt restructuring even in healthy economic environments.

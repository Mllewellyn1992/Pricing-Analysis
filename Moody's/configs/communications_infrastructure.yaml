id: communications_infrastructure
name: Communications Infrastructure
version: "12 Sep 2025"

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 10
    subfactors:
      - id: revenue
        name: Revenue (USD Billion)
        metric: revenue_usd_billion
        weight_pct: 10
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1, min: 40.0,  max: null }   # >= $40 (linear endpoint $60)
          - { band: "Aa",  score: 2, min: 20.0,  max: 40.0 }
          - { band: "A",   score: 3, min: 10.0,  max: 20.0 }
          - { band: "Baa", score: 4, min: 4.0,   max: 10.0 }
          - { band: "Ba",  score: 5, min: 1.5,   max: 4.0 }
          - { band: "B",   score: 6, min: 0.5,   max: 1.5 }
          - { band: "Caa", score: 7, min: 0.25,  max: 0.5 }
          - { band: "Ca",  score: 8, min: 0.0,   max: 0.25 }   # < $0.25
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 60.0
          ca_endpoint_value: 0.0

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 30
    subfactors:
      - id: business_model
        name: Business Model (qualitative)
        metric: business_model_band
        weight_pct: 15
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }
        notes:
          - "User selects the band based on the methodology’s qualitative descriptors (e.g., satellite vs fibre mix, constellation quality, redundancy, client diversity, contract structure, etc.)."

      - id: market_position_characteristics
        name: Market Position and Market Characteristics (qualitative)
        metric: market_position_band
        weight_pct: 15
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }
        notes:
          - "User selects the band using the qualitative table (coverage exclusivity, churn, barriers to entry/exit, contract tenor, competition from telcos/IT integrators, etc.)."

  - id: factor_3_profitability_efficiency
    name: Profitability and Efficiency
    weight_pct: 10
    subfactors:
      - id: ebitda_margin
        name: EBITDA Margin
        metric: ebitda_margin_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 100.0, max: null }    # >= 100% (linear endpoint 120%)
          - { band: "Aa",  score: 2, min: 80.0,  max: 100.0 }
          - { band: "A",   score: 3, min: 70.0,  max: 80.0 }
          - { band: "Baa", score: 4, min: 60.0,  max: 70.0 }
          - { band: "Ba",  score: 5, min: 45.0,  max: 60.0 }
          - { band: "B",   score: 6, min: 30.0,  max: 45.0 }
          - { band: "Caa", score: 7, min: 20.0,  max: 30.0 }
          - { band: "Ca",  score: 8, min: null,  max: 20.0 }    # < 20% (worst endpoint 10%)
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 120.0
          ca_endpoint_value: 10.0

  - id: factor_4_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 35
    subfactors:
      - id: ebitda_minus_capex_interest
        name: (EBITDA - CAPEX) / Interest Expense
        metric: ebitda_minus_capex_interest_x
        weight_pct: 15
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 12.0, max: null }     # >= 12x (linear endpoint 18x)
          - { band: "Aa",  score: 2, min: 7.0,  max: 12.0 }
          - { band: "A",   score: 3, min: 4.0,  max: 7.0 }
          - { band: "Baa", score: 4, min: 3.0,  max: 4.0 }
          - { band: "Ba",  score: 5, min: 2.0,  max: 3.0 }
          - { band: "B",   score: 6, min: 1.0,  max: 2.0 }
          - { band: "Caa", score: 7, min: 0.5,  max: 1.0 }
          - { band: "Ca",  score: 8, min: null, max: 0.5 }      # < 0.5x (worst endpoint 0x)
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 18.0
          ca_endpoint_value: 0.0

      - id: rcf_net_debt
        name: RCF / Net Debt
        metric: rcf_net_debt_pct
        weight_pct: 10
        direction: higher_better
        units: percent
        grid:
          - { band: "Aaa", score: 1, min: 80.0, max: null }      # >= 80% (linear endpoint 100%)
          - { band: "Aa",  score: 2, min: 60.0, max: 80.0 }
          - { band: "A",   score: 3, min: 35.0, max: 60.0 }
          - { band: "Baa", score: 4, min: 25.0, max: 35.0 }
          - { band: "Ba",  score: 5, min: 15.0, max: 25.0 }
          - { band: "B",   score: 6, min: 10.0, max: 15.0 }
          - { band: "Caa", score: 7, min: 5.0,  max: 10.0 }
          - { band: "Ca",  score: 8, min: null, max: 5.0 }      # < 5%
        endpoints_for_linear_scoring_if_net_debt_positive:
          aaa_endpoint_value: 100.0
          ca_endpoint_value: 5.0
        special_cases:
          - when: { net_debt_lt_0: true, rcf_gt_0: true }
            band: "Aaa"
            score: 1
            note: "If net debt is negative and RCF is positive, set numeric to best (0.5)."
          - when: { net_debt_lt_0: true, rcf_lte_0: true }
            band: "Ca"
            score: 8
            note: "If net debt is negative and RCF is negative/zero, set numeric to worst (20.5)."

      - id: debt_ebitda
        name: Debt / EBITDA
        metric: debt_ebitda_x
        weight_pct: 10
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1, min: 0.0, max: 0.5 }        # 0.0–0.5x
          - { band: "Aa",  score: 2, min: 0.5, max: 1.0 }        # 0.5–1.0x
          - { band: "A",   score: 3, min: 1.0, max: 2.0 }        # 1.0–2.0x
          - { band: "Baa", score: 4, min: 2.0, max: 3.0 }        # 2.0–3.0x
          - { band: "Ba",  score: 5, min: 3.0, max: 4.5 }        # 3.0–4.5x
          - { band: "B",   score: 6, min: 4.5, max: 6.5 }        # 4.5–6.5x
          - { band: "Caa", score: 7, min: 6.5, max: 8.5 }        # 6.5–8.5x
          - { band: "Ca",  score: 8, min: 8.5, max: null }       # > 8.5x
        endpoints_for_linear_scoring:
          aaa_endpoint_value: 0.0
          ca_endpoint_value: 12.0
        special_cases:
          - when: { debt_ebitda_lt_0: true }
            band: "Ca"
            score: 8
            note: "Negative Debt/EBITDA is treated as worst (numeric 20.5)."

  - id: factor_5_financial_policy
    name: Financial Policy
    weight_pct: 15
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 15
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1 }
          - { band: "Aa",  score: 2 }
          - { band: "A",   score: 3 }
          - { band: "Baa", score: 4 }
          - { band: "Ba",  score: 5 }
          - { band: "B",   score: 6 }
          - { band: "Caa", score: 7 }
          - { band: "Ca",  score: 8 }

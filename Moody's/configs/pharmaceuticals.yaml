id: pharmaceuticals
name: Pharmaceuticals
version: 15 Sep 2025
factors:
- id: factor_1_scale
  name: Scale
  weight_pct: 25
  subfactors:
  - id: revenue
    name: Revenue (USD Billion)
    metric: revenue_usd_billion
    weight_pct: 25
    direction: higher_better
    units: USD_billion
    grid:
    - band: Aaa
      score: 1
      min: 60.0
      max: null
    - band: Aa
      score: 2
      min: 30.0
      max: 60.0
    - band: A
      score: 3
      min: 15.0
      max: 30.0
    - band: Baa
      score: 4
      min: 8.0
      max: 15.0
    - band: Ba
      score: 5
      min: 3.0
      max: 8.0
    - band: B
      score: 6
      min: 1.0
      max: 3.0
    - band: Caa
      score: 7
      min: 0.25
      max: 1.0
    - band: Ca
      score: 8
      min: 0.0
      max: 0.25
    notes: 'Methodology linear endpoints: Aaa endpoint = $100bn (score floor), Ca endpoint = $0bn (score ceiling).'
- id: factor_2_business_profile
  name: Business Profile
  weight_pct: 40
  subfactors:
  - id: product_therapeutic_diversity
    name: Product and Therapeutic Diversity (qualitative)
    metric: product_therapeutic_diversity_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: Text guidance differs for branded vs generic companies (see scorecard).
  - id: geographic_diversity
    name: Geographic Diversity (qualitative)
    metric: geographic_diversity_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
  - id: patent_exposures
    name: Patent Exposures (qualitative)
    metric: patent_exposures_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: Text guidance differs for branded vs generic companies (see scorecard).
  - id: pipeline_quality
    name: Pipeline Quality (qualitative)
    metric: pipeline_quality_band
    weight_pct: 10
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
    notes: Text guidance differs for branded vs generic companies (see scorecard).
- id: factor_3_leverage_coverage
  name: Leverage and Coverage
  weight_pct: 20
  subfactors:
  - id: debt_ebitda
    name: Debt / EBITDA
    metric: debt_ebitda_x
    weight_pct: 10
    direction: lower_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 0.0
      max: 0.5
    - band: Aa
      score: 2
      min: 0.5
      max: 1.5
    - band: A
      score: 3
      min: 1.5
      max: 2.5
    - band: Baa
      score: 4
      min: 2.5
      max: 3.5
    - band: Ba
      score: 5
      min: 3.5
      max: 4.5
    - band: B
      score: 6
      min: 4.5
      max: 6.0
    - band: Caa
      score: 7
      min: 6.0
      max: 9.0
    - band: Ca
      score: 8
      min: 9.0
      max: null
    notes: 'Methodology linear endpoints: Aaa endpoint = 0.0x; Ca endpoint = 12.0x (or worse). Negative Debt/EBITDA treated as worst.'
  - id: rcf_net_debt
    name: RCF / Net Debt
    metric: rcf_net_debt_pct
    weight_pct: 5
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 70.0
      max: null
    - band: Aa
      score: 2
      min: 50.0
      max: 70.0
    - band: A
      score: 3
      min: 35.0
      max: 50.0
    - band: Baa
      score: 4
      min: 20.0
      max: 35.0
    - band: Ba
      score: 5
      min: 12.5
      max: 20.0
    - band: B
      score: 6
      min: 5.0
      max: 12.5
    - band: Caa
      score: 7
      min: 0.0
      max: 5.0
    - band: Ca
      score: 8
      min: -999.0
      max: 0.0
    notes: 'Methodology linear endpoints: Aaa endpoint = 100% (or better); Ca endpoint = -5% (or worse). Special cases when net debt is negative
      are described in footnotes.'
  - id: ebit_interest
    name: EBIT / Interest Expense
    metric: ebit_interest_x
    weight_pct: 5
    direction: higher_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 18.0
      max: null
    - band: Aa
      score: 2
      min: 12.0
      max: 18.0
    - band: A
      score: 3
      min: 7.0
      max: 12.0
    - band: Baa
      score: 4
      min: 4.0
      max: 7.0
    - band: Ba
      score: 5
      min: 2.25
      max: 4.0
    - band: B
      score: 6
      min: 1.0
      max: 2.25
    - band: Caa
      score: 7
      min: 0.5
      max: 1.0
    - band: Ca
      score: 8
      min: 0.0
      max: 0.5
    notes: 'Methodology linear endpoints: Aaa endpoint = 20.0x (or better); Ca endpoint = 0.0x.'
- id: factor_4_financial_policy
  name: Financial Policy
  weight_pct: 15
  subfactors:
  - id: financial_policy
    name: Financial Policy (qualitative)
    metric: financial_policy_band
    weight_pct: 15
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8

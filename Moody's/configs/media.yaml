id: media
name: Media
version: 1
source:
  title: "Moody's Rating Methodology: Media"
  date: "2025-09-12"

factors:
  - id: factor_1_scale
    name: Scale
    weight_pct: 15
    subfactors:
      - id: revenue
        name: Revenue (USD Billion)
        metric: revenue_usd_billion
        weight_pct: 15
        direction: higher_better
        units: USD_billion
        grid:
          - { band: "Aaa", score: 1,  min: 40.0,  max: null }
          - { band: "Aa",  score: 2,  min: 20.0,  max: 40.0 }
          - { band: "A",   score: 3,  min: 10.0,  max: 20.0 }
          - { band: "Baa", score: 4,  min: 4.0,   max: 10.0 }
          - { band: "Ba",  score: 5,  min: 1.25,  max: 4.0 }
          - { band: "B",   score: 6,  min: 0.5,   max: 1.25 }
          - { band: "Caa", score: 7,  min: 0.25,  max: 0.5 }
          - { band: "Ca",  score: 8,  min: 0.0,   max: 0.25 }
        notes:
          - "Footnote: linear scoring endpoints are Aaa=$60bn (numeric score 0.5) and Ca=$0.04bn (numeric score 20.5); for broadcasters, revenue is calculated on a two-year average basis."

  - id: factor_2_business_profile
    name: Business Profile
    weight_pct: 30
    subfactors:
      - id: market_position
        name: Market Position (qualitative)
        metric: market_position_band
        weight_pct: 10
        direction: qualitative
        grid:
          - band: "Aaa"
            score: 1
            description: |
              Broadcasters: Effectively all revenue generated from stations with lead rankings, with > 90% of revenues from exceptionally attractive markets. In the US, this means the top 10 markets.
              Cable Networks, Outdoor Advertisers and Other: Overwhelmingly dominant market share or brand; and exclusive content with effectively all major media properties in leading market positions.
              Publishers: Strong dominance with minimal competition for content/services that are difficult to replicate; and very high entry barriers generally backed by government protection.
          - band: "Aa"
            score: 2
            description: |
              Broadcasters: Vast majority of revenue generated from stations with lead rankings, with > 80% of revenues from highly attractive markets. In the US, this means the top 25 markets.
              Cable Networks, Outdoor Advertisers and Other: Very dominant market share or brand; and exclusive or premium content with most major media properties in leading market positions.
              Publishers: Strong dominance with some competition for content/services from smaller providers; content is difficult to replicate without investment at a scale beyond most competitors; and high entry barriers generally backed by government protection.
          - band: "A"
            score: 3
            description: |
              Broadcasters: Majority of revenue generated from stations with lead rankings, with > 70% of revenues from very attractive markets. In the US, this means the top 35 markets.
              Cable Networks, Outdoor Advertisers and Other: Leading market share or brand; premium content with majority of revenues generated by media properties in leading positions.
              Publishers: Strong position with some competition for content/services from smaller providers; content can be replicated but requires sizable investment by competitors; entry barriers exist but partially market-based with government oversight.
          - band: "Baa"
            score: 4
            description: |
              Broadcasters: Majority of revenue generated from stations with lead rankings, with > 50% of revenues from attractive markets. In the US, this means the top 50 markets.
              Cable Networks, Outdoor Advertisers and Other: Above-average market share or brand; premium content and majority of revenues generated by media properties in leading market positions.
              Publishers: Largest provider in a field of competitors; content/services can be replicated but requires sizable investment by competitors; entry barriers exist but largely market-based with modest government oversight.
          - band: "Ba"
            score: 5
            description: |
              Broadcasters: Majority of revenue generated from stations with lead rankings, with > 50% of revenues from fairly attractive markets. In the US, this means the top 75 markets.
              Cable Networks, Outdoor Advertisers and Other: Average market share; competitive content and majority of revenues generated by media properties in leading market positions.
              Publishers: Leading provider but competition exists; ongoing investment necessary to sustain brand name/position, but content/services can be differentiated; cost of entry is reasonable for most providers.
          - band: "B"
            score: 6
            description: |
              Broadcasters: Less than majority of revenue generated from stations with lead rankings, with > 40% of revenues from modestly attractive markets. In the US, this means the top 100 markets.
              Cable Networks, Outdoor Advertisers and Other: Average market share; less than majority of revenues generated by media properties in leading market positions.
              Publishers: Among leading providers in competitive field or strong niche position; content/services can be differentiated through investment.
          - band: "Caa"
            score: 7
            description: |
              Broadcasters: Less than majority of revenue generated from stations with lead rankings, with > 25% of revenues from modestly attractive markets. In the US, this means the top 100 markets.
              Cable Networks, Outdoor Advertisers and Other: Below-average market share; moderate percentage of revenues generated by media properties in leading market positions.
              Publishers: Similar-size competitors exist where content/services can be differentiated; or is a leading or specialized niche participant in industry where products/services have more commodity attributes and large number of competitors exist.
          - band: "Ca"
            score: 8
            description: |
              Broadcasters: Only a modest percentage of stations have lead rankings; revenues are generated predominantly from small markets.
              Cable Networks, Outdoor Advertisers and Other: Poor market share; modest percentage of revenues generated by media properties in leading market positions.
              Publishers: Smaller participant in an industry with commodity content/services and large number of competitors, many of which have more investment capacity.

      - id: market_share_trajectory
        name: Market Share Trajectory (qualitative)
        metric: market_share_trajectory_band
        weight_pct: 10
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1, description: "Substantial increase" }
          - { band: "Aa",  score: 2, description: "Low-double-digit percentage increase" }
          - { band: "A",   score: 3, description: "Single-digit percentage increase" }
          - { band: "Baa", score: 4, description: "Flat to marginally increasing" }
          - { band: "Ba",  score: 5, description: "Generally flat" }
          - { band: "B",   score: 6, description: "Marginally declining to flat" }
          - { band: "Caa", score: 7, description: "Moderate deterioration" }
          - { band: "Ca",  score: 8, description: "Significant deterioration" }

      - id: business_model
        name: Business Model (qualitative)
        metric: business_model_band
        weight_pct: 10
        direction: qualitative
        grid:
          - band: "Aaa"
            score: 1
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Exceptional revenue diversification; revenues are extremely stable or subscription-based; and exceptional potential to benefit from emerging business opportunities, including technology or new media.
              Publishers: 3+ distinct business segments; exceptional business and geographic revenue diversification; largest market < 25% of revenue; and exceptional potential to benefit from emerging business opportunities, including technology or new media.
          - band: "Aa"
            score: 2
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Excellent revenue diversification; revenues are predominantly stable or subscription-based; and excellent potential to benefit from emerging business opportunities, including technology or new media.
              Publishers: 3+ distinct business segments; excellent business and geographic revenue diversification; and excellent potential to benefit from emerging business opportunities, including technology or new media.
          - band: "A"
            score: 3
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Very good revenue diversification; majority of revenues are stable or subscription-based; very good potential to benefit from emerging business opportunities, including technology or new media.
              Publishers: 3+ distinct business segments; very good business and geographic revenue diversification; very good potential to benefit from emerging business opportunities, including technology or new media.
          - band: "Baa"
            score: 4
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Good revenue diversification; moderate level of revenues are stable or subscription-based; good potential to benefit from emerging business opportunities, including technology or new media.
              Publishers: 3+ distinct business segments; good business and geographic revenue diversification; good potential to benefit from emerging business opportunities, including technology or new media.
          - band: "Ba"
            score: 5
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Average revenue diversification; a fairly modest portion of revenues are stable or subscription-based; some potential to benefit from emerging business opportunities, including technology or new media.
              Publishers: 2+ distinct business segments; average business and geographic revenue diversification; some potential to benefit from emerging business opportunities, including technology or new media.
          - band: "B"
            score: 6
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Below-average revenue diversification; a modest portion of revenues are stable or subscription-based; some risk or threat from changes in technology and business environment.
              Publishers: 2+ distinct business segments; below-average business and geographic revenue diversification; some risk or threat from changes in technology and business environment.
          - band: "Caa"
            score: 7
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Modest level of revenue diversification; revenues are largely cyclical or lack stability over cycles; above-average risk or threat from changes in technology and business environment.
              Publishers: 2+ distinct business segments; modest level of business and geographic revenue diversification; above-average risk or threat from changes in technology and business environment.
          - band: "Ca"
            score: 8
            description: |
              Broadcasters and Cable Networks, Outdoor Advertisers and Other: Lack of revenue diversification; revenues are largely cyclical and lack stability over cycles; high risk or threat from changes in technology and business environment.
              Publishers: Single business segment; lack of business and geographic revenue diversification; high risk or threat from changes in technology and business environment.

  - id: factor_3_leverage_coverage
    name: Leverage and Coverage
    weight_pct: 45
    subfactors:
      - id: debt_ebitda_broadcasters
        name: Debt / EBITDA (Broadcasters, Cable Networks, Outdoor Advertisers and Other)
        metric: debt_ebitda_other_x
        weight_pct: 25
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1,  min: 0.0,  max: 0.5 }
          - { band: "Aa",  score: 2,  min: 0.5,  max: 1.0 }
          - { band: "A",   score: 3,  min: 1.0,  max: 1.5 }
          - { band: "Baa", score: 4,  min: 1.5,  max: 2.5 }
          - { band: "Ba",  score: 5,  min: 2.5,  max: 4.25 }
          - { band: "B",   score: 6,  min: 4.25, max: 6.25 }
          - { band: "Caa", score: 7,  min: 6.25, max: 8.75 }
          - { band: "Ca",  score: 8,  min: 8.75, max: null }
        notes:
          - "Footnote: linear scoring endpoints are Aaa=0x (numeric score 0.5) and Ca=15x (numeric score 20.5); negative Debt/EBITDA also maps to 20.5; for broadcasters, EBITDA is a two-year average."

      - id: debt_ebitda_publishers
        name: Debt / EBITDA (Publishers)
        metric: debt_ebitda_publishers_x
        weight_pct: 25
        direction: lower_better
        units: times
        grid:
          - { band: "Aaa", score: 1,  min: 0.0, max: 0.5 }
          - { band: "Aa",  score: 2,  min: 0.5, max: 1.0 }
          - { band: "A",   score: 3,  min: 1.0, max: 1.5 }
          - { band: "Baa", score: 4,  min: 1.5, max: 2.0 }
          - { band: "Ba",  score: 5,  min: 2.0, max: 3.0 }
          - { band: "B",   score: 6,  min: 3.0, max: 5.0 }
          - { band: "Caa", score: 7,  min: 5.0, max: 8.0 }
          - { band: "Ca",  score: 8,  min: 8.0, max: null }
        notes:
          - "Same footnote as Debt/EBITDA above (linear scoring endpoints)."

      - id: cov_ebitda_capex_interest_broadcasters
        name: (EBITDA - CAPEX) / Interest Expense (Broadcasters, Cable Networks, Outdoor Advertisers and Other)
        metric: ebitda_minus_capex_interest_other_x
        weight_pct: 20
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1,  min: 15.0, max: null }
          - { band: "Aa",  score: 2,  min: 10.0, max: 15.0 }
          - { band: "A",   score: 3,  min: 7.0,  max: 10.0 }
          - { band: "Baa", score: 4,  min: 4.0,  max: 7.0 }
          - { band: "Ba",  score: 5,  min: 2.25, max: 4.0 }
          - { band: "B",   score: 6,  min: 1.5,  max: 2.25 }
          - { band: "Caa", score: 7,  min: 1.0,  max: 1.5 }
          - { band: "Ca",  score: 8,  min: 0.0,  max: 1.0 }
        notes:
          - "Footnote: linear scoring endpoints are Aaa=40x (numeric score 0.5) and Ca=(1)x (numeric score 20.5); for broadcasters, numerator uses two-year average EBITDA minus capex."

      - id: cov_ebitda_capex_interest_publishers
        name: (EBITDA - CAPEX) / Interest Expense (Publishers)
        metric: ebitda_minus_capex_interest_publishers_x
        weight_pct: 20
        direction: higher_better
        units: times
        grid:
          - { band: "Aaa", score: 1,  min: 15.0, max: null }
          - { band: "Aa",  score: 2,  min: 12.0, max: 15.0 }
          - { band: "A",   score: 3,  min: 9.0,  max: 12.0 }
          - { band: "Baa", score: 4,  min: 6.0,  max: 9.0 }
          - { band: "Ba",  score: 5,  min: 3.0,  max: 6.0 }
          - { band: "B",   score: 6,  min: 1.5,  max: 3.0 }
          - { band: "Caa", score: 7,  min: 1.0,  max: 1.5 }
          - { band: "Ca",  score: 8,  min: 0.0,  max: 1.0 }
        notes:
          - "Same footnote as (EBITDA-CAPEX)/Interest above (linear scoring endpoints)."

  - id: factor_4_financial_policy
    name: Financial Policy
    weight_pct: 10
    subfactors:
      - id: financial_policy
        name: Financial Policy (qualitative)
        metric: financial_policy_band
        weight_pct: 10
        direction: qualitative
        grid:
          - { band: "Aaa", score: 1, description: "Expected to have extremely conservative financial policies (including risk and liquidity management); very stable metrics; essentially no event risk; and public commitment to very strong credit profile over the long term." }
          - { band: "Aa",  score: 2, description: "Expected to have very conservative financial policies (including risk and liquidity management); stable metrics; minimal event risk that would cause a rating transition; and public commitment to strong credit profile over the long term." }
          - { band: "A",   score: 3, description: "Expected to have predictable financial policies (including risk and liquidity management) that preserve creditor interests. Although modest event risk exists, the effect on leverage is likely to be small and temporary; strong commitment to a solid credit profile." }
          - { band: "Baa", score: 4, description: "Expected to have financial policies (including risk and liquidity management) that balance the interests of creditors and shareholders; some risk that debt-funded acquisitions or shareholder distributions could lead to a weaker credit profile." }
          - { band: "Ba",  score: 5, description: "Expected to have financial policies (including risk and liquidity management) that tend to favor shareholders over creditors; above-average financial risk resulting from shareholder distributions, acquisitions or other significant capital structure changes." }
          - { band: "B",   score: 6, description: "Expected to have financial policies (including risk and liquidity management) that favor shareholders over creditors; high financial risk resulting from shareholder distributions, acquisitions or other significant capital structure changes." }
          - { band: "Caa", score: 7, description: "Expected to have financial policies (including risk and liquidity management) that create elevated risk of debt restructuring in varied economic environments." }
          - { band: "Ca",  score: 8, description: "Expected to have financial policies (including risk and liquidity management) that create elevated risk of debt restructuring even in healthy economic environments." }

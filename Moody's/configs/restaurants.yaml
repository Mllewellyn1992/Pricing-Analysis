id: restaurants
name: Restaurants
version: 2 Sep 2025
factors:
- id: factor_1_scale
  name: Scale
  weight_pct: 20
  subfactors:
  - id: revenue
    name: Revenue (USD Billion)
    metric: revenue_usd_billion
    weight_pct: 10
    direction: higher_better
    units: USD_billion
    grid:
    - band: Aaa
      score: 1
      min: 40.0
      max: null
    - band: Aa
      score: 2
      min: 23.0
      max: 40.0
    - band: A
      score: 3
      min: 11.0
      max: 23.0
    - band: Baa
      score: 4
      min: 5.0
      max: 11.0
    - band: Ba
      score: 5
      min: 2.25
      max: 5.0
    - band: B
      score: 6
      min: 0.5
      max: 2.25
    - band: Caa
      score: 7
      min: 0.25
      max: 0.5
    - band: Ca
      score: 8
      min: 0.0
      max: 0.25
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 60.0
      ca_endpoint_value: 0.0
      note: 'Moody''s linear scoring note: $60bn or better => numeric score 0.5; $0 => 20.5.'
  - id: systemwide_restaurants
    name: Number of Systemwide Restaurants
    metric: systemwide_restaurants_count
    weight_pct: 5
    direction: higher_better
    units: count
    grid:
    - band: Aaa
      score: 1
      min: 55000.0
      max: null
    - band: Aa
      score: 2
      min: 30000.0
      max: 55000.0
    - band: A
      score: 3
      min: 15000.0
      max: 30000.0
    - band: Baa
      score: 4
      min: 5000.0
      max: 15000.0
    - band: Ba
      score: 5
      min: 1500.0
      max: 5000.0
    - band: B
      score: 6
      min: 400.0
      max: 1500.0
    - band: Caa
      score: 7
      min: 100.0
      max: 400.0
    - band: Ca
      score: 8
      min: 0.0
      max: 100.0
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 90000.0
      ca_endpoint_value: 0.0
      note: 'Moody''s linear scoring note: 90,000 or better => numeric score 0.5; 0 => 20.5.'
  - id: revenue_geographic_region
    name: Revenue by Geographic Region (qualitative)
    metric: revenue_geographic_region_band
    weight_pct: 5
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
- id: factor_2_business_profile
  name: Business Profile
  weight_pct: 10
  subfactors:
  - id: brand_diversity
    name: Brand Diversity (qualitative)
    metric: brand_diversity_band
    weight_pct: 5
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
  - id: brand_strength
    name: Brand Strength (qualitative)
    metric: brand_strength_band
    weight_pct: 5
    direction: qualitative
    grid:
    - band: Aaa
      score: 1
    - band: Aa
      score: 2
    - band: A
      score: 3
    - band: Baa
      score: 4
    - band: Ba
      score: 5
    - band: B
      score: 6
    - band: Caa
      score: 7
    - band: Ca
      score: 8
- id: factor_3_profitability_efficiency
  name: Profitability and Efficiency
  weight_pct: 10
  subfactors:
  - id: roa_npatbui_avg_assets
    name: ROA (NPATBUI / Avg. Assets)
    metric: roa_npatbui_avg_assets_pct
    weight_pct: 10
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 15.0
      max: null
    - band: Aa
      score: 2
      min: 11.0
      max: 15.0
    - band: A
      score: 3
      min: 7.5
      max: 11.0
    - band: Baa
      score: 4
      min: 5.0
      max: 7.5
    - band: Ba
      score: 5
      min: 2.5
      max: 5.0
    - band: B
      score: 6
      min: 1.0
      max: 2.5
    - band: Caa
      score: 7
      min: 0.0
      max: 1.0
    - band: Ca
      score: 8
      min: -1000000000.0
      max: 0.0
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 20.0
      ca_endpoint_value: -5.0
      note: 'Moody''s linear scoring note: 20% or better => numeric score 0.5; (5)% or worse => 20.5.'
- id: factor_4_leverage_coverage
  name: Leverage and Coverage
  weight_pct: 45
  subfactors:
  - id: rcf_debt
    name: RCF / Debt
    metric: rcf_debt_pct
    weight_pct: 15
    direction: higher_better
    units: percent
    grid:
    - band: Aaa
      score: 1
      min: 55.0
      max: null
    - band: Aa
      score: 2
      min: 45.0
      max: 55.0
    - band: A
      score: 3
      min: 35.0
      max: 45.0
    - band: Baa
      score: 4
      min: 25.0
      max: 35.0
    - band: Ba
      score: 5
      min: 15.0
      max: 25.0
    - band: B
      score: 6
      min: 5.0
      max: 15.0
    - band: Caa
      score: 7
      min: 0.0
      max: 5.0
    - band: Ca
      score: 8
      min: -1000000000.0
      max: 0.0
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 100.0
      ca_endpoint_value: -5.0
      note: 'Moody''s linear scoring note: 100% or better => numeric score 0.5; (5)% or worse => 20.5.'
  - id: debt_ebitda
    name: Debt / EBITDA
    metric: debt_ebitda_x
    weight_pct: 15
    direction: lower_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 0.0
      max: 1.0
    - band: Aa
      score: 2
      min: 1.0
      max: 2.0
    - band: A
      score: 3
      min: 2.0
      max: 3.0
    - band: Baa
      score: 4
      min: 3.0
      max: 4.0
    - band: Ba
      score: 5
      min: 4.0
      max: 5.0
    - band: B
      score: 6
      min: 5.0
      max: 6.5
    - band: Caa
      score: 7
      min: 6.5
      max: 8.0
    - band: Ca
      score: 8
      min: 8.0
      max: null
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 0.0
      ca_endpoint_value: 12.0
      note: 'Moody''s linear scoring note: 0x or better => numeric score 0.5; 12x or worse => 20.5; negative Debt/EBITDA also treated as 20.5.'
  - id: ebit_interest
    name: EBIT / Interest Expense
    metric: ebit_interest_x
    weight_pct: 15
    direction: higher_better
    units: times
    grid:
    - band: Aaa
      score: 1
      min: 12.0
      max: null
    - band: Aa
      score: 2
      min: 8.0
      max: 12.0
    - band: A
      score: 3
      min: 5.0
      max: 8.0
    - band: Baa
      score: 4
      min: 3.0
      max: 5.0
    - band: Ba
      score: 5
      min: 2.0
      max: 3.0
    - band: B
      score: 6
      min: 1.0
      max: 2.0
    - band: Caa
      score: 7
      min: 0.5
      max: 1.0
    - band: Ca
      score: 8
      min: -1000000000.0
      max: 0.5
    endpoints_for_linear_scoring:
      aaa_endpoint_value: 20.0
      ca_endpoint_value: 0.0
      note: 'Moody''s linear scoring note: 20x or better => numeric score 0.5; 0x or worse => 20.5.'

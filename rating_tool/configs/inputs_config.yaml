version: 1
common:
  sections:
  - title: Core inputs
    fields:
    - id: tenor_years
      label: Tenor (years)
      type: number
    - id: customer_pricing_bps
      label: Customer pricing (bps)
      type: number
methodologies:
  building_materials:
    sections:
    - title: Core inputs
      fields:
      - id: base_year
        label: Latest financial year
        type: number
      - id: revenue_mn
        label: Revenue (Mn)
        type: number
        year: current
      - id: ebit
        label: EBIT
        type: number
        year: current
      - id: gross_interest
        label: Gross interest expense
        type: number
        year: current
      - id: depreciation
        label: Depreciation
        type: number
        year: current
      - id: amortization
        label: Amortization of intangibles
        type: number
        year: current
    - title: 5-year EBIT and revenue (for margin volatility)
      type: history_5yr
    - title: Assets
      fields:
      - id: assets_y0
        label: Assets
        type: number
        year: current
      - id: assets_y1
        label: Assets
        type: number
        year: prior
    - title: Debt / book capitalization
      fields:
      - id: short_term_debt
        label: Short-term debt
        type: number
        year: current
      - id: current_portion_lt_debt
        label: Current portion of long-term debt
        type: number
        year: current
      - id: long_term_debt_net
        label: Long-term debt, net of current portion
        type: number
        year: current
      - id: capital_leases
        label: Liability for capital leases
        type: number
        year: current
      - id: total_equity
        label: Total equity
        type: number
        year: current
      - id: minority_interest
        label: Minority interest
        type: number
        year: current
      - id: non_current_deferred_taxes
        label: Non-current deferred income taxes
        type: number
        year: current
    - title: Leverage and coverage inputs
      fields:
      - id: total_debt_gross
        label: Total debt (gross)
        type: computed
      - id: cash
        label: Cash and cash equivalents
        type: number
        year: current
      - id: cash_like_assets
        label: Cash-like current financial assets
        type: number
        year: current
    - title: Cash flow inputs (RCF / Net debt)
      fields:
      - id: cfo
        label: Cash flow from operations (CFO)
        type: number
        year: current
      - id: nwc_y0
        label: Net working capital
        type: number
        year: current
      - id: nwc_y1
        label: Net working capital
        type: number
        year: prior
      - id: lt_operating_assets_y0
        label: Net long-term operating assets/liabilities
        type: number
        year: current
      - id: lt_operating_assets_y1
        label: Net long-term operating assets/liabilities
        type: number
        year: prior
      - id: common_dividends
        label: Common dividends
        type: number
        year: current
      - id: preferred_dividends
        label: Preferred dividends
        type: number
        default: 0
        year: current
      - id: minority_dividends
        label: Minority dividends
        type: number
        default: 0
        year: current
    - title: Qualitative inputs
      type: qualitative
